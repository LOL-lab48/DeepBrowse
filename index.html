<!DOCTYPE html>
<html>
<head>
  <title>DeepBrowse AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">⚡ DeepBrowse AI</div>

  <div class="topbar">
    <button id="accountBtn">👤 Account</button>
  </div>
</header>

<!-- LOGIN POPUP -->
<div id="loginPopup" class="popup hidden">
  <div class="popup-box">
    <span id="closeLogin">✖</span>
    <h2>Login to sync favourites</h2>
    <input id="username" placeholder="Enter username" />
    <button id="loginBtn">Login</button>
  </div>
</div>

<main>
  <div class="sidebar">
    <h2>Explore</h2>
    <div id="sidebar"></div>
  </div>

  <div class="content">
    <input id="search" placeholder="Search topics or links..." />
    <div id="breadcrumbs"></div>
    <div id="content"></div>
  </div>
</main>

<script src="script.js"></script>

</body>
</html>
